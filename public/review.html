<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Windsong &mdash; Leave a Review</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #eef2f0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .card {
    background: #ffffff;
    border-radius: 24px;
    width: 100%;
    max-width: 380px;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.10);
  }

  .card-top {
    background: linear-gradient(160deg, #2C6073 0%, #3d7d92 100%);
    padding: 1.75rem 2rem 2.5rem;
    text-align: center;
    position: relative;
  }

  .logo {
    width: 200px;
    margin: 0 auto 1rem;
    display: block;
    opacity: 0.95;
  }

  .avatar-wrapper {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.8);
    overflow: hidden;
    margin: 0 auto;
    background: #cfdde3;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .avatar-wrapper img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .card-body {
    padding: 1.75rem 2rem 2rem;
    text-align: center;
  }

  .provider-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 600;
    color: #1a1a1a;
    line-height: 1.2;
    margin-bottom: 0.25rem;
  }

  .provider-creds {
    font-size: 12px;
    font-weight: 500;
    color: #2C6073;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 0.25rem;
  }

  .provider-title {
    font-size: 13px;
    color: #888;
    margin-bottom: 0.15rem;
  }

  .provider-practice {
    font-size: 13px;
    color: #555;
    margin-bottom: 1.75rem;
  }

  .divider {
    height: 1px;
    background: #f0eeea;
    margin: 0 0 1.75rem;
  }

  .ask-text {
    font-size: 14px;
    color: #555;
    line-height: 1.65;
    margin-bottom: 1.5rem;
  }

  .review-btn {
    display: block;
    width: 100%;
    background: #2C6073;
    color: #ffffff;
    text-decoration: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    padding: 1rem 1.5rem;
    border-radius: 14px;
    text-align: center;
    transition: background 0.2s, transform 0.1s;
    letter-spacing: 0.02em;
  }

  .review-btn:hover {
    background: #1f4756;
    transform: translateY(-1px);
  }

  .review-btn:active {
    transform: translateY(0);
  }

  .stars-row {
    display: flex;
    justify-content: center;
    gap: 4px;
    margin-bottom: 1.25rem;
  }

  .star {
    width: 20px;
    height: 20px;
    fill: #f5a623;
  }

  .footer-note {
    font-size: 11px;
    color: #bbb;
    margin-top: 1.25rem;
    line-height: 1.5;
  }
</style>
</head>
